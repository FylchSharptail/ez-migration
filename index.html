<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>EzGuild Migration Explorer</title>
<style>
  :root{
    --bg:#fafaf9; --panel:#fff; --line:#e7e5e4; --ink:#1c1917; --muted:#78716c;
    --us:#a21caf; --usbg:#fdf4ff; --them:#44403c; --thembg:#f5f5f4;
    --good:#15803d; --goodbg:#f0fdf4; --bad:#b91c1c; --badbg:#fef2f2; --warn:#b45309;
    --accent:#0e7490;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1240px;margin:0 auto;padding:14px}
  h1{font-size:19px;margin:0 0 2px}
  .sub{color:var(--muted);font-size:12.5px;margin:0 0 12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .grow{flex:1 1 auto}
  label.ctl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  input[type=range]{width:280px;vertical-align:middle}
  .big{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  table{width:100%;border-collapse:collapse}
  th,td{padding:7px 7px;white-space:nowrap}
  thead th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--line);text-align:left;cursor:pointer;user-select:none}
  thead th.r,td.r{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr{border-bottom:1px solid #f1f0ef;cursor:pointer}
  tbody tr:hover{background:#fafaf9}
  tbody tr.sel{background:var(--usbg);box-shadow:inset 3px 0 0 var(--us)}
  .pill{display:inline-block;padding:1px 7px;border-radius:999px;font-size:11px;font-weight:600}
  .bar{position:relative;display:inline-block;min-width:48px;height:16px;background:#f1f0ef;border-radius:4px;overflow:hidden;vertical-align:middle}
  .bar>i{position:absolute;left:0;top:0;bottom:0;border-radius:4px}
  .bar>span{position:relative;padding-left:5px;font-size:11px;font-variant-numeric:tabular-nums;line-height:16px}
  .muted{color:var(--muted)}
  .us{color:var(--us)} .star{color:#f59e0b}
  /* ?-badge tooltip: NOT native title=. Visible badge, hover/focus popover. */
  .help{position:relative;display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;margin-left:4px;border-radius:50%;border:1px solid #cbd5e1;color:var(--muted);font-size:10px;font-weight:700;cursor:help;background:#fff;flex:none}
  .help:focus{outline:2px solid var(--accent);outline-offset:1px}
  .help .bubble{display:none;position:absolute;z-index:40;left:50%;top:130%;transform:translateX(-50%);
    width:260px;background:#1c1917;color:#fafaf9;text-align:left;padding:9px 11px;border-radius:8px;font-size:12px;font-weight:400;
    line-height:1.5;text-transform:none;letter-spacing:0;box-shadow:0 6px 24px rgba(0,0,0,.25);transition:opacity .12s}
  .help .bubble b{color:#fde68a}
  .help .bubble em{color:#93c5fd;font-style:normal}
  .help .bubble::before{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#1c1917}
  .help:hover .bubble,.help:focus .bubble{display:block}
  th .help .bubble,td .help .bubble{white-space:normal}
  /* self-test panel */
  .tests{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .tchip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;cursor:help;position:relative}
  .tchip.ok{background:var(--goodbg);color:var(--good);border:1px solid #bbf7d0}
  .tchip.no{background:var(--badbg);color:var(--bad);border:1px solid #fecaca}
  .banner{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;font-weight:700}
  .banner.ok{background:var(--goodbg);color:var(--good)} .banner.no{background:var(--badbg);color:var(--bad)}
  .pwarn{margin:10px 0;padding:10px 14px;border-radius:8px;background:#fffbeb;color:var(--warn);border:1px solid #f59e0b;font-weight:600;line-height:1.4}
  .info{margin:10px 0;padding:9px 13px;border-radius:8px;background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;font-weight:600;line-height:1.4}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:9px;padding:10px}
  .stat .k{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center}
  .stat .v{font-size:18px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums}
  .scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .gnum{font-weight:600} .gnum.ggood{color:var(--good)} .gnum.gwarn{color:var(--warn)} .gnum.gmut{color:var(--muted)} .gnum.gbad{color:var(--bad)}
  .gsub{font-size:9.5px;color:var(--muted);margin-top:1px;white-space:nowrap;letter-spacing:.1px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
  @media(max-width:760px){.two{grid-template-columns:1fr}}
  .rost{border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .rost h4{margin:0;padding:8px 11px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
  .rost.them h4{background:var(--thembg);color:var(--them)} .rost.us h4{background:var(--usbg);color:var(--us)}
  .rost table{font-size:12.5px}
  .rost td{padding:5px 9px;border-top:1px solid #f1f0ef}
  tr.cut{opacity:.4}
  .kicklist{margin-top:10px;font-size:12.5px}
  .tag{font-size:10.5px;padding:1px 6px;border-radius:4px;background:#f1f0ef;color:var(--muted)}
  /* collapsed self-test (keep it out of the header noise; assertions still run) */
  details.selftest{margin-top:12px}
  details.selftest>summary{list-style:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  details.selftest>summary::-webkit-details-marker{display:none}
  details.selftest>summary .tw{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  details.selftest[open]>summary .tw::after{content:"\25b2 hide"}
  details.selftest:not([open])>summary .tw::after{content:"\25bc details"}
  /* floating seat dock: always-hovering +/- and a draggable slider, usable while scrolled */
  #seatdock{position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:60;display:flex;flex-direction:column;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 10px;box-shadow:0 6px 24px rgba(0,0,0,.16)}
  #seatdock .dlabel{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  #seatdock .dval{font-size:22px;font-weight:700;color:var(--us);font-variant-numeric:tabular-nums;line-height:1}
  #seatdock button{width:38px;height:34px;border:1px solid var(--line);background:#fff;border-radius:9px;font-size:20px;font-weight:700;color:var(--ink);cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
  #seatdock button:hover:not(:disabled){background:var(--usbg);border-color:var(--us);color:var(--us)}
  #seatdock button:active:not(:disabled){transform:translateY(1px)}
  #seatdock button:disabled{opacity:.3;cursor:default}
  #seatdock input[type=range]{writing-mode:vertical-lr;direction:rtl;width:26px;height:130px;margin:2px 0;cursor:pointer;accent-color:var(--us)}
  @media(max-width:760px){#seatdock{right:8px;padding:8px 6px;gap:6px}#seatdock input[type=range]{height:90px}}
</style>
</head>

<script type="module">
/* ==== ez_core.js (inlined) ==== */
// ez_core.js - pure logic for the EzGuild Migration Explorer.
// Runs identically in Node (ESM import) and the browser (<script type="module">).
// NO framework. Every function here is pure and unit-tested in ez_core.test.mjs;
// the in-page self-test panel calls checkInvariants() on the same code.

export const num = (x) => { const n = typeof x === 'number' ? x : parseFloat(x); return Number.isFinite(n) ? n : 0; };

// Deterministic tie-breaker so ranks/seating never depend on input order or
// engine-unstable sorts. Member ids are numeric strings; compare numerically.
export const cmpId = (a, b) => { const x = num(a), y = num(b); return x !== y ? x - y : String(a) < String(b) ? -1 : String(a) > String(b) ? 1 : 0; };

// Members of one guild that have a known power reading, strongest first.
export function rosterFor(bundle, gid) {
  return bundle.members
    .filter((m) => m.gid === gid && num(m.hp) === 1)
    .map((m) => ({ ...m, hero: num(m.hero), titan: num(m.titan), idle: num(m.idle) }))
    .sort((a, b) => (b.hero - a.hero) || cmpId(a.id, b.id));
}

export function ourRoster(bundle) { return rosterFor(bundle, bundle.our); }

// Current member count of a guild (the real, varying roster size).
export function rosterSize(bundle, gid) { return rosterFor(bundle, gid).length; }

// Kicks the target guild must make so that `seats` of our members fit under the cap.
// seats = how many of OUR squad we insist on seating. Never negative.
export function deriveKicks(rosterSz, seats, cap = 30) {
  return Math.max(0, rosterSz - (cap - seats));
}

// Merge the two rosters: keep target's strongest after kicks, seat our strongest,
// rank the combined pool, cap at `cap`. Returns the full picture for one guild+seats.
export function computeMerge(theirRoster, ours, seats, cap = 30) {
  // Be self-sufficient about ordering: keep the STRONGEST after kicks regardless
  // of input order, and never negative-slice or seat a negative count.
  const byHero = (a, b) => (b.hero - a.hero) || cmpId(a.id, b.id);
  theirRoster = theirRoster.slice().sort(byHero);
  ours = ours.slice().sort(byHero);
  const kicks = Math.min(theirRoster.length, deriveKicks(theirRoster.length, seats, cap));
  const keepN = Math.max(0, theirRoster.length - kicks);
  const kept = theirRoster.slice(0, keepN);
  const seatCount = Math.min(ours.length, Math.max(0, seats), cap - kept.length);
  const seated = ours.slice(0, seatCount);
  const kicked = theirRoster.slice(keepN);
  const pool = [
    ...kept.map((m) => ({ ...m, us: false })),
    ...seated.map((m) => ({ ...m, us: true })),
  ].sort((a, b) => (b.hero - a.hero) || cmpId(a.id, b.id));
  const top = pool.slice(0, cap);
  const rankById = {};
  top.forEach((m, i) => { rankById[m.id] = i + 1; });
  const inIds = new Set(top.map((m) => m.id));
  // Our players who land in the GW (Guild War) top-20 of the merged guild.
  const usInWar = seated.filter((m) => rankById[m.id] && rankById[m.id] <= GW_TEAM).length;
  return { kicks, kept, seated, seatCount, kicked, pool: top, rankById, inIds, merged: top.length, usInWar };
}

// GW (Guild War) battle team = strongest 20 of the merged guild. AoC/CoW use all 30.
export const GW_TEAM = 20;
export function warTeamSize(merged) { return Math.min(GW_TEAM, merged); }

// Engine scoring weights (mirror scores_depth.py). FIT blends gold(=gold_score of the
// Gold-1 gap), peer balance, floor strength, sustain(titanite). GET blends the GM's kick
// pain (Gpain, i.e. the Active-hit cost), their need for players, and motivation. These
// document that Gold gap + Active hit are ALREADY inside FIT/GET (not omitted axes) and
// let checkInvariants re-derive the published scores from their components.
export const FIT_W = { gold: 0.333, peer: 0.278, floor: 0.278, sustain: 0.111 };
export const GET_W = { Gpain: 0.45, Gneed: 0.30, Gmotiv: 0.25 };

// Look up the precomputed FIT/GET score row for a guild at a kick depth. Clamps to
// the guild's depth range, then falls back to the nearest existing depth <= kk
// (robust even if a depth happens to be missing).
export function lookupScore(two, gid, kicks) {
  const rows = two.filter((t) => t.gid === gid);
  if (!rows.length) return null;
  const ks = rows.map((r) => num(r.kicks));
  const lo = Math.min(...ks), hi = Math.max(...ks);
  const kk = Math.min(Math.max(kicks, lo), hi);
  let best = null;
  for (const r of rows) {
    const rk = num(r.kicks);
    if (rk === kk) return r;
    if (rk < kk && (!best || rk > num(best.kicks))) best = r;
  }
  return best || rows.reduce((a, b) => (num(a.kicks) < num(b.kicks) ? a : b));
}

// Build one master-table row per candidate guild at the chosen seats slider value.
// Every numeric here is intrinsic to the guild (varies row to row), never broadcast.
export function buildMasterRows(bundle, seats) {
  const ours = ourRoster(bundle);
  const gids = [...new Set(bundle.depth.map((d) => d.gid))];
  return gids.map((gid) => {
    const drow = bundle.depth.find((d) => d.gid === gid) || {};
    const their = rosterFor(bundle, gid);
    const mg = computeMerge(their, ours, seats);
    const sc = lookupScore(bundle.two, gid, mg.kicks) || {};
    const dAtK = bundle.depth.find((d) => d.gid === gid && num(d.kicks) === mg.kicks) || {};
    const lang = (bundle.members.find((m) => m.gid === gid) || {}).lang || '?';
    return {
      gid,
      name: drow.guild || gid,
      srv: num(drow.srv),
      lang,
      roster: their.length,        // current members (varies)
      kicks: mg.kicks,             // derived per guild (varies)
      seated: mg.seatCount,        // our members who get in (varies)
      merged: mg.merged,           // total after merge (varies, <= cap)
      warTeam: warTeamSize(mg.merged),
      usInWar: mg.usInWar,         // OUR players in the GW top-20 (varies)
      active: num(dAtK.painful != null ? dAtK.painful : drow.painful),
      pconf: dAtK.pconf || drow.pconf || 'high',
      goldgap: num(sc.goldgap != null ? sc.goldgap : drow.goldgap),
      titan: num(dAtK.titan != null ? dAtK.titan : drow.titan),
      FITn: num(sc.FITn),
      GETn: num(sc.GETn),
      ev: num(sc.FITn) * num(sc.GETn) / 100,
      conf: sc.conf || 'high',
    };
  });
}

// Plain-language read combining FIT (quality for us) and GET (GM acceptance odds).
// Thresholds are explicit so the label is explainable and testable.
// Expected value of the migration = quality FOR US (FIT) times the odds the GM
// actually accepts us (GET). Surfaces the best PICKABLE host, not the best
// theoretical fit (a high-FIT guild with GET~10 is a trap, not a target).
export function ev(r) { return num(r.FITn) * num(r.GETn) / 100; }

// Plain-language read of the Gold-1 gap (champion top-30 power / our merged top-30).
// Mirrors the engine's gap_to_label exactly (guarded against drift in data_faithful).
// LOWER is better: <=1.0 we'd top the server, <=1.03 we contend, else we join but won't top.
export function gapLabel(g) {
  g = num(g);
  if (g <= 1.0) return 'Merges to #1';
  if (g <= 1.03) return 'Contends #1';
  return 'Join, not top';
}

// FIT is the home we live in for months; GET is a one-time, retriable gate. So a
// high GET must NOT dress up a low-FIT guild as a good target. Below WEAK_HOME a
// guild is flagged as a poor home even when it is easy to join.
export const WEAK_HOME = 55;
export function verdict(r) {
  const f = num(r.FITn), g = num(r.GETn);
  if (f >= 85 && g >= 55) return { label: 'primary', tone: 'good', rank: 5 };
  if (f >= 85) return { label: 'stretch', tone: 'warn', rank: 4 };
  if (g >= 60 && f >= WEAK_HOME) return { label: 'easy sell', tone: 'good', rank: 3 };
  if (g >= 60) return { label: 'weak home', tone: 'warn', rank: 1.5 };
  if (f >= 65) return { label: 'fallback', tone: 'warn', rank: 2 };
  return { label: 'marginal', tone: 'muted', rank: 1 };
}

// Sort master rows by a column key. Numeric keys sort numerically; string keys
// (name, lang) sort case-insensitively; verdict sorts by its rank. Always falls
// back to a deterministic tie-break (guild name, then id) so order is stable.
const SORT_KEYS = {
  name: (r) => r.name, srv: (r) => num(r.srv), lang: (r) => r.lang,
  members: (r) => num(r.roster), kicks: (r) => num(r.kicks), active: (r) => num(r.active),
  war: (r) => num(r.usInWar), gold: (r) => num(r.goldgap), titan: (r) => num(r.titan),
  FIT: (r) => num(r.FITn), GET: (r) => num(r.GETn), ev: (r) => ev(r), verdict: (r) => verdict(r).rank,
};
export function sortRows(rows, key, dir = -1) {
  const get = SORT_KEYS[key] || SORT_KEYS.FIT;
  const cmp = (a, b) => {
    const va = get(a), vb = get(b);
    let c;
    if (typeof va === 'string' || typeof vb === 'string') c = String(va).toLowerCase() < String(vb).toLowerCase() ? -1 : String(va).toLowerCase() > String(vb).toLowerCase() ? 1 : 0;
    else c = va - vb;
    if (c) return c * dir;
    // deterministic tie-break, independent of sort direction
    const n = String(a.name).toLowerCase().localeCompare(String(b.name).toLowerCase());
    return n || cmpId(a.gid, b.gid);
  };
  return rows.slice().sort(cmp);
}

// The heart of the user's ask: assertions that the PRESENTED data is correct and
// not degenerate. Each returns {name, pass, detail}. Used by node tests AND the
// in-page self-test panel.
export function checkInvariants(bundle, seats = bundle.squad) {
  const out = [];
  const add = (name, pass, detail) => out.push({ name, pass: !!pass, detail: detail || '' });
  const rows = buildMasterRows(bundle, seats);
  const ours = ourRoster(bundle);
  // depth row at kicks=0 is a SEPARATELY-EXTRACTED view of each guild's current size
  // (kept == roster when nothing is kicked). It is produced by a different pipeline
  // file than the member roster, so it catches transform bugs on either side; it is
  // NOT fully independent (common-mode on the upstream snapshot), so it is backed up
  // by the game-rule / known-squad anchors below.
  const baseKept = (gid) => { const d = bundle.depth.find((x) => x.gid === gid && num(x.kicks) === 0); return d ? num(d.kept) : null; };
  // Distribution test with teeth: not "more than one value exists" (a 29x30 + 1x29
  // broadcast would pass that), but "enough distinct values AND no single value
  // dominates". Defeats the original near-uniform/broadcast degeneracy.
  const distributed = (arr, minDistinct, maxModeFrac = 0.6) => {
    if (!arr.length) return false;
    const c = new Map();
    arr.forEach((v) => c.set(v, (c.get(v) || 0) + 1));
    return c.size >= minDistinct && Math.max(...c.values()) <= arr.length * maxModeFrac;
  };
  const rawFinite = (v) => v !== null && v !== undefined && v !== '' && Number.isFinite(typeof v === 'number' ? v : parseFloat(v));

  // 0. External anchors not derived from the per-guild definitions: a known real-world
  //    fact (our squad of `squad`) and a game rule (a guild holds 1..cap). These do not
  //    pass by construction; they tie the presentation to truth outside the snapshot math.
  add('our-squad-known', ourRoster(bundle).length === bundle.squad, `our roster (${ourRoster(bundle).length}) == known squad ${bundle.squad}`);
  add('roster-in-game-bounds', rows.every((r) => r.roster >= 1 && r.roster <= bundle.cap), `every roster within 1..${bundle.cap} (game cap rule)`);

  // 1. Members column reflects real, varying roster sizes (distribution, not constant/broadcast)
  //    AND matches the separately-extracted kept-at-zero-kicks figure.
  const rosters = rows.map((r) => r.roster);
  add('members-vary', distributed(rosters, 5), `distinct roster sizes: ${[...new Set(rosters)].sort((a, b) => a - b).join(',')}`);
  add('members-match-engine', rows.every((r) => baseKept(r.gid) === r.roster), 'each Members == depth.kept at 0 kicks (separate extractor)');

  // 2. Kicks are not uniform across guilds, and equal roster - kept (the real cost).
  // Differentiation is a stable property measured at full commitment (seat all 20):
  // there it varies by roster size. (At a low slider every guild may need 0 kicks,
  // which is correct, not the old "broadcast one number to all rows" degeneracy.)
  const fullKicks = buildMasterRows(bundle, bundle.squad).map((r) => r.kicks);
  add('kicks-differentiate', distributed(fullKicks, 4), `at full squad, distinct kicks: ${[...new Set(fullKicks)].sort((a, b) => a - b).join(',')}`);
  add('kicks-per-guild', rows.every((r) => { const mg = computeMerge(rosterFor(bundle, r.gid), ours, seats); return mg.kept.length === r.roster - r.kicks && r.kicks <= r.roster && r.kicks === deriveKicks(r.roster, seats); }), 'kicks derived per guild (roster - kept), never broadcast');

  // 3. Merge math holds for every guild (incl. the cap-truncation branch logic).
  add('merge-cap', rows.every((r) => r.merged <= bundle.cap), `all merged <= ${bundle.cap}`);
  add('merge-kept-plus-seated', rows.every((r) => { const mg = computeMerge(rosterFor(bundle, r.gid), ours, seats); return mg.kept.length + mg.seatCount === mg.merged && mg.merged === Math.min(bundle.cap, mg.kept.length + mg.seatCount); }), 'kept + seated == merged (capped) for every guild');

  // 4. Every player we say we seat actually survives the merged top-30 re-sort
  //    (guards seatCount lying if the cap branch ever truncates us out).
  add('seated-survive', rows.every((r) => { const mg = computeMerge(rosterFor(bundle, r.gid), ours, seats); return mg.seated.every((s) => mg.inIds.has(s.id)) && mg.seated.length === mg.seatCount; }), 'all seated us-players are in the merged 30');

  // 5. Kicked members are strictly the weakest tail (we never kick a kept-strength player).
  add('kicked-is-weakest-tail', rows.every((r) => { const mg = computeMerge(rosterFor(bundle, r.gid), ours, seats); if (!mg.kicked.length || !mg.kept.length) return true; return Math.min(...mg.kept.map((m) => m.hero)) >= Math.max(...mg.kicked.map((m) => m.hero)); }), 'min(kept hero) >= max(kicked hero)');

  // 6. Scores are normalised so the best option in the dataset reads 100.
  const maxFIT = Math.max(...bundle.two.map((t) => num(t.FITn)));
  const maxGET = Math.max(...bundle.two.map((t) => num(t.GETn)));
  add('fit-scale-100', Math.abs(maxFIT - 100) < 0.5, `max FITn in dataset = ${maxFIT}`);
  add('get-scale-100', Math.abs(maxGET - 100) < 0.5, `max GETn in dataset = ${maxGET}`);

  // 7. The score row shown on each line describes the SAME kick depth as that line.
  add('score-depth-matches', rows.every((r) => { const sc = lookupScore(bundle.two, r.gid, r.kicks); return sc && num(sc.kicks) === r.kicks; }), 'FIT/GET row kicks == displayed kicks (no depth mismatch)');

  // 8. Roster ranks are a clean contiguous 1..merged for EVERY guild (no gaps/dupes).
  add('ranks-clean', rows.every((r) => { const mg = computeMerge(rosterFor(bundle, r.gid), ours, seats); const rk = Object.values(mg.rankById).sort((a, b) => a - b); return rk.length === mg.merged && rk.every((v, i) => v === i + 1); }), 'ranks 1..merged, contiguous, unique, every guild');

  // 9. "Us in GW" is our players inside the merged GW team, bounded by GW_TEAM and our seats.
  //    Bound tied to the GW_TEAM constant (not a literal) so it stays correct for any seats.
  add('us-in-gw-bound', rows.every((r) => r.usInWar <= Math.min(GW_TEAM, r.merged) && r.usInWar <= r.seated), `usInWar <= min(${GW_TEAM}, merged) and <= seated`);

  // 10. No NaN leaking into any displayed numeric.
  add('no-nan', rows.every((r) => [r.roster, r.kicks, r.seated, r.merged, r.usInWar, r.active, r.goldgap, r.titan, r.FITn, r.GETn, r.ev].every((v) => Number.isFinite(v))), 'all displayed numerics are finite');

  // 12. Score-formula faithfulness: the displayed FIT/GET (and their normalized FITn/GETn)
  //     must re-derive from the published component columns via the engine's documented
  //     weights. This catches stale / hand-edited / miscomputed scores that every other
  //     check (which trusts the precomputed FIT/GET fields) would happily pass.
  //     Components are stored rounded, so tolerate the resulting <=0.6 residual (real max 0.35).
  const maxF = Math.max(...bundle.two.map((t) => num(t.FIT)));
  const maxG = Math.max(...bundle.two.map((t) => num(t.GET)));
  add('score-formula-faithfulness', maxF > 0 && maxG > 0 && bundle.two.every((t) => {
    const fit = FIT_W.gold * num(t.gold) + FIT_W.peer * num(t.peer) + FIT_W.floor * num(t.floor) + FIT_W.sustain * num(t.sustain);
    const get = GET_W.Gpain * num(t.Gpain) + GET_W.Gneed * num(t.Gneed) + GET_W.Gmotiv * num(t.Gmotiv);
    return Math.abs(fit - num(t.FIT)) <= 0.6 && Math.abs(get - num(t.GET)) <= 0.6
      && Math.abs(num(t.FIT) / maxF * 100 - num(t.FITn)) <= 0.15
      && Math.abs(num(t.GET) / maxG * 100 - num(t.GETn)) <= 0.15;
  }), 'FIT/GET/FITn/GETn re-derive from published components via engine weights');

  // 11. RAW source fields parse to finite numbers WITHOUT relying on num()'s 0-fallback,
  //     so missing/garbage data fails loudly instead of being silently shown as 0.
  add('raw-fields-finite',
    rows.every((r) => { const sc = lookupScore(bundle.two, r.gid, r.kicks); return sc && rawFinite(sc.FITn) && rawFinite(sc.GETn); })
    && bundle.members.filter((m) => num(m.hp) === 1).every((m) => rawFinite(m.hero)),
    'raw FIT/GET (shown rows) + member hero parse finite without 0-coercion');

  // 13. No literal \uXXXX escape leaked into any PRESENTED string value (the original
  //     JSX double-escape bug: a correctly-encoded glyph parses to "—", a broken one to
  //     the 6-char "\u2014"). Scans master-row strings + member display strings.
  const ESC = /\\u[0-9a-fA-F]{4}/;
  const hasEsc = (v) => typeof v === 'string' && ESC.test(v);
  add('no-unicode-escapes',
    rows.every((r) => Object.values(r).every((v) => !hasEsc(v)))
    && bundle.members.every((m) => !hasEsc(m.name) && !hasEsc(m.guild) && !hasEsc(m.lang)),
    'no literal \\uXXXX in any presented string (guild/member names, lang, labels)');

  // 14. Source provenance: the shipped/rendered arrays still match the row counts that
  //     gen_data.py measured directly from the source CSV bytes at extraction time, and
  //     a well-formed sha256 of each source file is carried so the presentation is
  //     traceable to source (not merely internally self-consistent). Teeth: hand-adding
  //     or dropping a row in data.json without regenerating flips this red. data_faithful
  //     separately asserts these digests equal the actual committed CSV bytes.
  const P = bundle.provenance || {};
  const sha = (k) => (P[k] && typeof P[k].sha256 === 'string') ? P[k].sha256 : '';
  const sha64 = (s) => /^[0-9a-f]{64}$/.test(s);
  add('provenance-rowcounts-match',
    bundle.provenance
    && num(P.member_power && P.member_power.rows) === bundle.members.length
    && num(P.kick_depth && P.kick_depth.rows) === bundle.depth.length
    && num(P.two_scores && P.two_scores.rows) === bundle.two.length
    && sha64(sha('member_power')) && sha64(sha('kick_depth')) && sha64(sha('two_scores')),
    `shipped rows m=${bundle.members.length}/d=${bundle.depth.length}/t=${bundle.two.length} == source CSV counts; src sha ${sha('member_power').slice(0, 8)}/${sha('kick_depth').slice(0, 8)}/${sha('two_scores').slice(0, 8)}`);

  return out;
}

/* ==== end core ==== */

const bundle = JSON.parse(document.getElementById('bundle').textContent);
const $ = (s, r=document) => r.querySelector(s);
const el = (tag, attrs={}, kids=[]) => {
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)){
    if (k==='class') n.className=v; else if (k==='html') n.innerHTML=v;
    else if (k.startsWith('on')&&typeof v==='function') n.addEventListener(k.slice(2),v);
    else if (v!=null) n.setAttribute(k,v);
  }
  (Array.isArray(kids)?kids:[kids]).forEach(c=>{ if(c==null)return; n.append(c.nodeType?c:document.createTextNode(String(c))); });
  return n;
};
const fmtM = n => (num(n)/1e6).toFixed(2)+'M';
const fmtK = n => { n=num(n); return n>=1000?Math.round(n/1000)+'k':String(n); };
const escAttr = s => String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

// ?-badge tooltip. text supports <b> and <em> only (we control the strings).
function help(text){
  const span = el('span',{class:'help',tabindex:'0','aria-label':'help','role':'button'});
  span.append(document.createTextNode('?'));
  const b = el('span',{class:'bubble',html:text});
  span.append(b);
  // Keep the popover inside the viewport (right/left edge columns would clip).
  const clamp = ()=>{ b.style.marginLeft='0px'; const r=b.getBoundingClientRect(); const pad=8; let shift=0;
    if(r.right>window.innerWidth-pad) shift=-(r.right-(window.innerWidth-pad));
    else if(r.left<pad) shift=(pad-r.left);
    if(shift) b.style.marginLeft=Math.round(shift)+'px'; };
  span.addEventListener('mouseenter',clamp);
  span.addEventListener('focus',clamp);
  return span;
}

function bestRow(){ let b=null; bundle.two.forEach(r=>{ if(!b||num(r.FITn)>num(b.FITn)) b=r; }); return b; }
function bestSeatsFor(gid){ // seats that reproduce the best-FIT depth for this guild
  const r = bundle.two.filter(t=>t.gid===gid).slice().sort((a,b)=>num(b.FITn)-num(a.FITn))[0];
  if(!r) return 20; const roster = rosterSize(bundle, gid);
  // kicks = roster-(30-seats) => seats = kicks - roster + 30 ; clamp 1..20
  return Math.max(1, Math.min(20, num(r.kicks) - roster + 30));
}

const ours = ourRoster(bundle);
// Default the slider to the MISSION: seat all 20 of our squad (leave nobody
// behind). Lower the slider to explore partial moves. Default-select the
// strongest-FIT guild at the full-squad commitment.
const defaultSeats = 20;
const _full = sortRows(buildMasterRows(bundle, defaultSeats), 'ev', -1);
const state = { seats: defaultSeats, gid: _full.length ? _full[0].gid : bundle.depth[0].gid, sort:{k:'ev',dir:-1} };

function verdictUI(r){ const v=verdict(r); return [v.label, v.tone]; }

function render(){
  const app = $('#app'); app.innerHTML='';

  // ----- controls + self-test -----
  const ctl = el('div',{class:'card'});
  const head = el('div',{class:'row'});
  const seatWrap = el('div',{});
  const lab = el('label',{class:'ctl'}); lab.append('Seats for our squad: '); 
  const seatVal = el('span',{class:'us'}, String(state.seats)); lab.append(seatVal); lab.append(help(TIP.seats));
  const sl = el('input',{type:'range',min:'1',max:'20',value:String(state.seats)});
  sl.addEventListener('input',()=>{ state.seats=num(sl.value); render(); });
  seatWrap.append(lab, el('div',{}, sl));
  head.append(seatWrap, el('div',{class:'grow'}));
  const left = ours.length - state.seats; // squad members not seated at this slider
  const lbLabel = el('label',{class:'ctl'}); lbLabel.append('Left behind'); lbLabel.append(help('<b>Our players NOT seated</b> at the current slider (squad minus seats). <em>The mission is to move all 20, so 0 is the goal; any positive number means you are abandoning that many.</em>'));
  const lbStat = el('div',{}, [lbLabel, el('div',{class:'big',style:left>0?'color:var(--bad)':'color:var(--good)'}, (left>0?left:'0')+(left>0?' players':' \u2713'))]);
  head.append(lbStat);
  const ourStat = el('div',{}, [el('label',{class:'ctl'},'Our squad'), el('div',{class:'big'}, ours.length+' players')]);
  head.append(ourStat);
  ctl.append(head);

  // self-test
  const res = checkInvariants(bundle, state.seats);
  // Stronger guarantee: invariants must hold at EVERY slider position, not just
  // the one on screen. Run them across all seats and report as one aggregate chip.
  const seatFails = [];
  for(let s=1;s<=bundle.squad;s++){ if(checkInvariants(bundle,s).some(r=>!r.pass)) seatFails.push(s); }
  res.push({name:'all-seats-hold', pass:seatFails.length===0, detail: seatFails.length? ('invariants FAIL at seats: '+seatFails.join(',')) : ('every slider position 1..'+bundle.squad+' passes all invariants, not just the one shown')});
  const fails = res.filter(r=>!r.pass);
  const banner = el('div',{class:'banner '+(fails.length?'no':'ok')},
    (fails.length? '✖ '+fails.length+' data check(s) FAILED' : '✓ All '+res.length+' data-correctness checks pass'));
  const testWrap = el('div',{class:'tests'});
  res.forEach(t=>{
    const c = el('span',{class:'tchip '+(t.pass?'ok':'no'),tabindex:'0'}, (t.pass?'✓ ':'✖ ')+t.name);
    c.append(help((t.pass?'<b>Pass.</b> ':'<b>FAIL.</b> ')+escAttr(t.detail)));
    testWrap.append(c);
  });
  const domWrap = el('div',{class:'tests',id:'domtests'});
  // Collapse the self-test out of the header by default (it was visual noise). The
  // assertions STILL run every render; only their detailed chip list is folded away.
  // Auto-opens if anything fails so a real problem is never hidden.
  const det = el('details',{class:'selftest'});
  const summ = el('summary',{});
  summ.append(banner, el('span',{class:'tw'},''));
  det.append(summ,
    el('div',{class:'k',style:'margin-top:8px;font-size:11px;color:var(--muted);text-transform:uppercase'}, 'Live data-correctness self-test (runs in your browser on the data shown)'),
    testWrap, domWrap);
  if(fails.length) det.setAttribute('open','');
  ctl.append(det);
  app.append(ctl);

  // Partial-migration guard: when seating fewer than the full squad, the ranking
  // re-optimizes for a SUBSET move and silently reorders. Warn so the user does not
  // read a partial-mode top row as the globally-best full-squad home (open-cave T32).
  if(state.seats < bundle.squad){
    ctl.append(el('div',{class:'pwarn'},
      '\u26a0 Partial migration: this ranking optimizes moving only '+state.seats+' of '+ours.length+
      ' players. FIT / GET / Pick / Read are slider-dependent and reorder as you drag \u2014 they do NOT'+
      ' evaluate a full-squad (or split-across-guilds) plan. Left behind: '+left+' player'+(left===1?'':'s')+
      '. Set the slider to '+bundle.squad+' for the full-squad comparison.'));
  }

  // Anti-winner-framing caption: when NO row is a strong option (gettable AND a good home),
  // the default Pick sort + auto-opened #1 can be misread as "the answer". Flag that the
  // leaders are close tradeoffs, not a recommendation (open-cave T39). Data-driven: only
  // shows when no primary/easy-sell exists at the current slider.
  {
    const _mr = buildMasterRows(bundle, state.seats);
    const _strong = _mr.some((r) => { const l = verdict(r).label; return l === 'primary' || l === 'easy sell'; });
    if(!_strong){
      ctl.append(el('div',{class:'info'},
        '\u2139 No clearly strong target at '+state.seats+' seat'+(state.seats===1?'':'s')+
        ': the leaders are close tradeoffs, not a clear winner. Higher FIT = better home; higher GET = easier acceptance \u2014 read both, not just Pick. The #1 row is not automatically the right move.'));
    }
  }

  // ----- master table -----
  const rows = buildMasterRows(bundle, state.seats);
  const sorted = sortRows(rows, state.sort.k, state.sort.dir);
  rows.length=0; sorted.forEach(r=>rows.push(r));

  const cols = [
    ['Guild','name','l',TIP.guild],['Srv','srv','r',TIP.srv],['Lang','lang','l',TIP.lang],
    ['Members','members','r',TIP.members],['Kicks','kicks','r',TIP.kicks],['Active hit','active','r',TIP.active],
    ['Us in GW','war','r',TIP.war],['Gold gap','gold','r',TIP.gold],['Titan/wk','titan','r',TIP.titan],
    ['FIT','FIT','r',TIP.fit],['GET','GET','r',TIP.get],[(state.seats<bundle.squad?('Pick @'+state.seats):'Pick'),'ev','r',TIP.ev],['Read','verdict','l',TIP.verdict],
  ];
  const tbl = el('table');
  const thead = el('thead'); const htr = el('tr');
  cols.forEach(([label,key,al,tip])=>{
    const active = state.sort.k===key;
    const th = el('th',{class:al==='r'?'r':''});
    th.addEventListener('click',()=>{ state.sort = active?{k:key,dir:-state.sort.dir}:{k:key,dir:-1}; render(); });
    th.append(label + (active?(state.sort.dir<0?' ↓':' ↑'):''));
    if(tip) th.append(help(tip));
    htr.append(th);
  });
  thead.append(htr); tbl.append(thead);
  const tb = el('tbody');
  rows.forEach(r=>{
    const [vtext,vcls]=verdictUI(r);
    const tr = el('tr',{class:state.gid===r.gid?'sel':''});
    tr.addEventListener('click',()=>{ state.gid=r.gid; render(); });
    const bar=(v,max,color)=>{ const b=el('span',{class:'bar'}); b.append(el('i',{style:`width:${Math.max(3,Math.min(100,100*v/max))}%;background:${color}`}), el('span',{},v.toFixed(0))); return b; };
    tr.append(
      el('td',{}, r.name),
      el('td',{class:'r muted'}, r.srv),
      el('td',{class:'muted'}, r.lang),
      el('td',{class:'r'}, r.roster),
      el('td',{class:'r'}, r.kicks),
      el('td',{class:'r'+(r.active>0?'':'')}, r.active + (r.pconf==='low'?'*':'')),
      el('td',{class:'r'}, r.usInWar+' / '+r.warTeam),
      el('td',{class:'r'}, [
        el('span',{class:'gnum '+(r.goldgap>1.20?'gbad':r.goldgap<=1.0?'ggood':r.goldgap<=1.03?'gwarn':'gmut')}, r.goldgap.toFixed(2)),
        el('div',{class:'gsub'}, gapLabel(r.goldgap)) ]),
      el('td',{class:'r muted'}, fmtK(r.titan)),
      el('td',{class:'r'}, bar(r.FITn,100,'#22c55e')),
      el('td',{class:'r'}, bar(r.GETn,100,'#0ea5e9') ),
      el('td',{class:'r'}, bar(r.ev,100,'#7c3aed') ),
      el('td',{}, [el('span',{class:'pill',style:`background:${vcls==='good'?'var(--goodbg)':vcls==='warn'?'#fffbeb':'#f5f5f4'};color:${vcls==='good'?'var(--good)':vcls==='warn'?'var(--warn)':'var(--muted)'}`}, vtext), r.conf==='low'?el('span',{class:'tag',style:'margin-left:4px'},'low-conf'):null]),
    );
    tb.append(tr);
  });
  tbl.append(tb);
  const tcard=el('div',{class:'card'});
  tcard.append(el('div',{class:'row',style:'margin-bottom:6px'},[el('strong',{},'Candidate guilds'),el('span',{class:'muted',style:'font-size:12px'},' \u00b7 click a row for the merged roster')]));
  tcard.append(el('div',{class:'scrollx'}, tbl));
  app.append(tcard);

  // ----- drill-down -----
  app.append(drill());

  // ----- DOM-faithfulness audit: verify the RENDERED cells, not just the model -----
  domAudit(rows);
  syncSeatDock();
}

// Floating seat dock: an always-visible right-side control (+/- buttons and a draggable
// vertical slider) that changes the seats value from anywhere on the page, so you can
// scroll down the table and still adjust it. Lives on <body>, OUTSIDE #app, so it
// survives render()'s innerHTML reset and does not shift #app's card indices.
function setSeats(v){ v=Math.max(1,Math.min(bundle.squad, v|0)); if(v===state.seats) return; state.seats=v; render(); }
function mountSeatDock(){
  if(document.getElementById('seatdock')) return;
  const up=el('button',{type:'button',id:'dockup','aria-label':'Seat one more'},'+');
  const val=el('div',{class:'dval',id:'dockval'}, String(state.seats));
  const dn=el('button',{type:'button',id:'dockdn','aria-label':'Seat one fewer'},'\u2212');
  const sl=el('input',{type:'range',min:'1',max:String(bundle.squad),value:String(state.seats),id:'dockrange','aria-label':'Seats for our squad'});
  up.addEventListener('click',()=>setSeats(state.seats+1));
  dn.addEventListener('click',()=>setSeats(state.seats-1));
  sl.addEventListener('input',()=>setSeats(num(sl.value)));
  document.body.append(el('div',{id:'seatdock'},[el('div',{class:'dlabel'},'Seats'), up, val, dn, sl]));
}
function syncSeatDock(){
  const v=document.getElementById('dockval'); if(v) v.textContent=String(state.seats);
  const r=document.getElementById('dockrange'); if(r && num(r.value)!==state.seats) r.value=String(state.seats);
  const up=document.getElementById('dockup'); if(up) up.disabled=state.seats>=bundle.squad;
  const dn=document.getElementById('dockdn'); if(dn) dn.disabled=state.seats<=1;
}

// Reads the actual rendered table + drill-down and checks they match the model.
// This is the "checks correctness of the data PRESENTED" guarantee at the DOM level.
function domAudit(modelRows){
  const wrap=$('#domtests'); if(!wrap) return; wrap.innerHTML='';
  const checks=[]; const add=(name,pass,detail)=>checks.push({name,pass:!!pass,detail:detail||''});
  const trs=[...document.querySelectorAll('#app .card:nth-of-type(2) tbody tr')];
  const cellText=(tr,i)=>tr.children[i]?tr.children[i].textContent.trim():'';
  // 1. one rendered row per model row
  add('dom-row-count', trs.length===modelRows.length, `DOM ${trs.length} vs model ${modelRows.length}`);
  // 2. rendered order == sortRows order
  const domNames=trs.map(tr=>cellText(tr,0));
  const wantNames=sortRows(modelRows,state.sort.k,state.sort.dir).map(r=>r.name);
  add('dom-sort-order', JSON.stringify(domNames)===JSON.stringify(wantNames), 'rendered order matches sortRows');
  // 3. each rendered Members/Kicks/UsInGW/FIT cell matches the model row by name
  const byName={}; modelRows.forEach(r=>byName[r.name]=r);
  let memOk=true,kickOk=true,warOk=true,fitOk=true,getOk=true,goldOk=true,evOk=true;
  let srvOk=true,langOk=true,activeOk=true,titanOk=true,readOk=true;
  trs.forEach(tr=>{ const r=byName[cellText(tr,0)]; if(!r){memOk=false;return;}
    if(cellText(tr,1)!==String(r.srv)) srvOk=false;
    if(cellText(tr,2)!==String(r.lang)) langOk=false;
    if(cellText(tr,3)!==String(r.roster)) memOk=false;
    if(cellText(tr,4)!==String(r.kicks)) kickOk=false;
    if(cellText(tr,5)!==(r.active + (r.pconf==='low'?'*':''))) activeOk=false;
    if(cellText(tr,6)!==(r.usInWar+' / '+r.warTeam)) warOk=false;
    {const gn=tr.children[7].querySelector('.gnum'); if(!gn||gn.textContent.trim()!==num(r.goldgap).toFixed(2)) goldOk=false;}
    if(cellText(tr,8)!==fmtK(r.titan)) titanOk=false;
    if(cellText(tr,9)!==num(r.FITn).toFixed(0)) fitOk=false;
    if(cellText(tr,10)!==num(r.GETn).toFixed(0)) getOk=false;
    if(cellText(tr,11)!==num(r.ev).toFixed(0)) evOk=false;
    {const pill=tr.children[12].querySelector('.pill'); if(!pill||pill.textContent.trim()!==verdictUI(r)[0]) readOk=false;}
  });
  add('dom-srv-cell', srvOk, 'rendered Srv == model srv');
  add('dom-lang-cell', langOk, 'rendered Lang == model lang');
  add('dom-members-cell', memOk, 'rendered Members == model roster');
  add('dom-kicks-cell', kickOk, 'rendered Kicks == model kicks');
  add('dom-active-cell', activeOk, 'rendered Active hit == model active (+ * when low-conf)');
  add('dom-usingw-cell', warOk, 'rendered Us-in-GW == usInWar / warTeam');
  add('dom-gold-cell', goldOk, 'rendered Gold gap == model goldgap (2dp)');
  add('dom-titan-cell', titanOk, 'rendered Titan/wk == fmtK(model titan)');
  add('dom-fit-cell', fitOk, 'rendered FIT == model FITn (toFixed 0)');
  add('dom-get-cell', getOk, 'rendered GET == model GETn (toFixed 0); FIT/GET not swapped');
  add('dom-ev-cell', evOk, 'rendered Pick == model ev = FITn*GETn/100 (toFixed 0)');
  add('dom-read-cell', readOk, 'rendered Read pill == verdict(r).label (full text, not clipped)');
  {const pw=document.querySelector('.pwarn'); add('dom-partial-warning', (state.seats < bundle.squad) ? !!pw : !pw, 'partial-migration warning shown iff seats<full squad');}
  {const mr=buildMasterRows(bundle,state.seats); const strong=mr.some(r=>{const l=verdict(r).label; return l==='primary'||l==='easy sell';}); const inf=document.querySelector('.info'); add('dom-strong-caption', strong? !inf : !!inf, 'no-strong-option caption shown iff no primary/easy-sell row');}
  // 4. drill-down matches the selected guild's recomputed merge
  const their=rosterFor(bundle,state.gid); const mg=computeMerge(their,ours,state.seats);
  const drillCard=document.querySelectorAll('#app .card')[2];
  const statVals={}; if(drillCard) [...drillCard.querySelectorAll('.stat')].forEach(s=>{ const label=(s.querySelector('.k').childNodes[0]||{}).textContent||''; statVals[label.trim()]=s.querySelector('.v').textContent.trim(); });
  add('drill-kicks', statVals['Kicks']===String(mg.kicks), `drill Kicks ${statVals['Kicks']} vs ${mg.kicks}`);
  add('drill-merged', statVals['Merged total']===(mg.merged+' / '+bundle.cap), 'drill Merged == computeMerge');
  add('drill-seated', statVals['Us seated']===String(mg.seatCount), 'drill Us seated == seatCount');
  add('drill-usingw', statVals['Us in GW']===(mg.usInWar+' / '+warTeamSize(mg.merged)), 'drill Us-in-GW == usInWar');
  // 5. drill roster lists have the right counts
  const usTable=drillCard?[...drillCard.querySelectorAll('.rost')].find(r=>r.className.includes('us')):null;
  if(usTable){ const stars=usTable.querySelectorAll('.star').length; add('drill-gw-stars', stars===mg.usInWar, `${stars} stars vs usInWar ${mg.usInWar}`); }
  // 6. no literal unicode escapes leaked into rendered text
  // Scan ALL presented text nodes, not document.body.innerText: innerText EXCLUDES
  // display:none subtrees, which would blind this guard to the ~48 tooltip .bubble
  // popovers (the most escape-dense region, where the original bug lived). Exclude only
  // <script>/<style> text (the inlined JSON bundle + module legitimately contain \\uXXXX).
  const escRe=/\\u[0-9a-f]{4}/i;
  const escLeaks=[...document.body.querySelectorAll('*')].filter(e=>e.tagName!=='SCRIPT'&&e.tagName!=='STYLE').flatMap(e=>[...e.childNodes]).filter(n=>n.nodeType===3 && escRe.test(n.nodeValue));
  const litEsc=escLeaks.length;
  add('dom-no-escapes', litEsc===0, litEsc? (litEsc+' literal \\uXXXX in presented text incl display:none tooltips e.g. "'+escLeaks[0].nodeValue.trim().slice(0,30)+'"') : 'no literal \\uXXXX in any presented text, including hidden tooltip popovers (scans text nodes, not innerText)');

  // 7. Presented == SEEN. Auditing textContent proves the right STRING is in the DOM, not
  //    that a human can read it: CSS clipping (overflow/ellipsis/max-width), display:none /
  //    visibility:hidden / opacity:0, or a zero-area box all leave textContent intact while
  //    the eye sees "123..." or nothing. Assert every rendered master-table cell is actually
  //    visible and not truncated, in the real browser layout this runs in.
  let visBad=null;
  for(const tr of trs){
    for(const td of tr.children){
      const cs=getComputedStyle(td); const rect=td.getBoundingClientRect();
      const clipped=td.scrollWidth>td.clientWidth+1;
      const hidden=cs.display==='none'||cs.visibility==='hidden'||parseFloat(cs.opacity)===0;
      const zeroArea=rect.width<1||rect.height<1;
      if(clipped||hidden||zeroArea){ visBad={txt:td.textContent.trim().slice(0,14),clipped,hidden,zeroArea,sw:td.scrollWidth,cw:td.clientWidth}; break; }
    }
    if(visBad) break;
  }
  add('dom-cells-visible', !visBad, visBad? ('cell "'+visBad.txt+'" not fully visible: '+JSON.stringify(visBad)) : 'every master-table cell is visible and not truncated (presented == seen)');

  // 8. Goal ask #4: tooltips are styled ?-badge popovers, NOT native title= on hover.
  //    Guard BOTH halves in the real browser: zero native [title] tooltips anywhere in the
  //    app, and every ?-badge actually carries its "?" glyph + non-empty popover content.
  {
    const nativeTitled=[...document.querySelectorAll('#app [title]')];
    const badges=[...document.querySelectorAll('#app .help')];
    const headerCols=document.querySelectorAll('#app .card:nth-of-type(2) thead th').length;
    const badgeBad=badges.find(h=>{ const glyph=((h.childNodes[0]||{}).textContent||'').trim(); const bub=h.querySelector('.bubble'); return glyph!=='?' || !bub || bub.textContent.trim().length===0; });
    const ok = nativeTitled.length===0 && badges.length>=headerCols && headerCols>0 && !badgeBad;
    add('dom-tooltips-not-native', ok, nativeTitled.length? (nativeTitled.length+' native title= tooltip(s) (must be 0)') : (badgeBad? 'a ?-badge is missing its ? glyph or popover content' : (badges.length+' ?-badge popovers cover '+headerCols+' headers, 0 native title=')));
  }

  const fails=checks.filter(c=>!c.pass).length;
  if(fails){const d=document.querySelector('.selftest'); if(d) d.setAttribute('open','');}
  wrap.append(el('div',{class:'k',style:'flex-basis:100%;font-size:11px;color:var(--muted);text-transform:uppercase;margin-top:4px'}, (fails?('\u2716 '+fails+' rendered-DOM check(s) failed'):'\u2713 rendered DOM matches the model ('+checks.length+' checks)')));
  checks.forEach(c=>{ const chip=el('span',{class:'tchip '+(c.pass?'ok':'no'),tabindex:'0'}, (c.pass?'\u2713 ':'\u2716 ')+c.name); chip.append(help((c.pass?'<b>Pass.</b> ':'<b>FAIL.</b> ')+escAttr(c.detail))); wrap.append(chip); });
}

function drill(){
  const gid=state.gid;
  const their=rosterFor(bundle,gid);
  const mg=computeMerge(their,ours,state.seats);
  const sc=lookupScore(bundle.two,gid,mg.kicks)||{};
  // Resolve the depth row with the SAME nearest<= logic FIT/GET use (lookupScore), so
  // Active hit can never desync from FIT/GET or fall back to the kicks=0 row if a future
  // sparse dataset lacked the exact kicks row (anthro-cave T36). Exact today (verified).
  const drow=lookupScore(bundle.depth,gid,mg.kicks)||bundle.depth.find(d=>d.gid===gid)||{};
  const name=(bundle.depth.find(d=>d.gid===gid)||{}).guild||gid;
  const card=el('div',{class:'card'});
  card.append(el('div',{class:'row',style:'margin-bottom:6px'},[el('strong',{style:'font-size:15px'},name),el('span',{class:'muted'},'server '+num(drow.srv))]));

  const stat=(k,v,tip)=>{ const s=el('div',{class:'stat'}); const kk=el('div',{class:'k'},k); if(tip)kk.append(help(tip)); s.append(kk,el('div',{class:'v'},v)); return s; };
  const grid=el('div',{class:'grid'});
  grid.append(
    stat('Their members',their.length,TIP.members),
    stat('Kicks',mg.kicks,TIP.kicks),
    stat('Us seated',mg.seatCount,'<b>Our players who get in</b> at the current slider.'),
    stat('Merged total',mg.merged+' / '+bundle.cap,'<b>Headcount after merge</b> (caps at 30). AoC/CoW use all of them; GW only the top 20.'),
    stat('Us in GW',mg.usInWar+' / '+warTeamSize(mg.merged),TIP.war),
    stat('Active hit',num(drow.painful)+(drow.pconf==='low'?'*':''),TIP.active),
    stat('FIT',num(sc.FITn).toFixed(0),TIP.fit),
    stat('GET',num(sc.GETn).toFixed(0)+(sc.conf==='low'?'*':''),TIP.get),
  );
  card.append(grid);

  // rosters
  const inIds=mg.inIds, rankById=mg.rankById;
  const rtable=(title,cls,list,isUs)=>{
    const box=el('div',{class:'rost '+cls});
    const inCount=list.filter(m=>inIds.has(m.id)).length;
    const h=el('h4',{}); h.append(el('span',{},title)); h.append(el('span',{class:'muted',style:'font-weight:400;font-size:11px'}, inCount+' / '+list.length+' in')); box.append(h);
    const t=el('table'); const head=el('tr',{style:'text-align:left'});
    const th=(x,tip,al)=>{ const e=el('td',{class:'muted '+(al||''),style:'font-size:10.5px;text-transform:uppercase'}); e.append(x); if(tip)e.append(help(tip)); return e; };
    head.append(th('#',TIP.rank),th('Member',TIP.member),th('Hero','',('r'))); 
    head.lastChild.className='muted r'; head.lastChild.style.textAlign='right';
    t.append(head);
    list.forEach(m=>{
      const isIn=inIds.has(m.id); const rank=rankById[m.id]; const war=isIn&&rank<=20;
      const tr=el('tr',{class:isIn?'':'cut'});
      tr.append(
        el('td',{class:'muted',style:'width:34px'}, isIn?rank:'\u00b7'),
        el('td',{}, [war?el('span',{class:'star'},'★ '):document.createTextNode('  '), document.createTextNode(m.name), isUs?el('span',{class:'us',style:'font-size:10px'},' \u00b7us'):null]),
        el('td',{class:'r muted',style:'text-align:right'}, fmtM(m.hero)),
      );
      t.append(tr);
    });
    box.append(t); return box;
  };
  const two=el('div',{class:'two'});
  two.append(rtable(name+' (theirs)','them',their,false), rtable('EzGuild (ours)','us',ours,true));
  card.append(two);

  if(mg.kicked.length){
    const kl=el('div',{class:'kicklist'});
    kl.append(el('strong',{},'Kicked ('+mg.kicked.length+'): '));
    kl.append(el('span',{class:'muted'}, mg.kicked.map(m=>m.name+' '+fmtM(m.hero)).join('  \u00b7  ')));
    card.append(kl);
  }
  return card;
}

mountSeatDock();
render();
$('#built').textContent = 'Built from power_snapshot \u00b7 '+bundle.members.length+' member records \u00b7 '+new Set(bundle.depth.map(d=>d.gid)).size+' candidate guilds.';
</script>
</body>
